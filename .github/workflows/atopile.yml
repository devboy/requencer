name: Atopile Hardware Build

on:
  push:
    branches: [main]
    paths:
      - 'hardware/**'
      - 'hardware-faceplate/**'
      - '.github/workflows/atopile.yml'
  pull_request:
    paths:
      - 'hardware/**'
      - 'hardware-faceplate/**'
      - '.github/workflows/atopile.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  HW_IMAGE: ghcr.io/devboy/requencer-hw-tools:latest
  PCB_SRC: hardware/elec/layout/default/default.kicad_pcb
  PCB_PLACED: hardware/build/placed.kicad_pcb
  PCB_ROUTED: hardware/build/routed.kicad_pcb

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Pull or build hardware tools image
        run: |
          docker pull "$HW_IMAGE" 2>/dev/null || \
          docker build -t "$HW_IMAGE" hardware/docker/

      - name: Print tool versions
        run: |
          docker run --rm "$HW_IMAGE" bash -c '
            echo "=== Tool versions ==="
            ato --version || echo "ato: version flag not supported"
            kicad-cli version || echo "kicad-cli: version flag not supported"
            python3 --version
            echo "=== Installed Python packages ==="
            pip list 2>/dev/null || pip3 list 2>/dev/null || true
          '

      # --- Preflight: fast local validation ---
      - name: Preflight checks
        run: python3 hardware/scripts/preflight_check.py

      # --- Stage 1: Compile .ato → KiCad ---
      - name: Build hardware
        run: |
          docker run --rm -v "$PWD":/work -w /work "$HW_IMAGE" bash -c '
            set -euo pipefail
            echo "=== ato.yaml ==="
            cat hardware/ato.yaml
            echo ""
            rm -f hardware/elec/layout/default/default.kicad_pcb
            cd hardware && ato --non-interactive build --keep-picked-parts 2>&1 | tee /work/ato-build.log
            echo ""
            echo "=== Post-build layout dir ==="
            ls -laR elec/layout/ 2>/dev/null || echo "(empty/missing)"
          '

      - name: Check ato build output
        run: |
          # Display all warnings from the build
          if grep -cE "^\s*•" ato-build.log > /dev/null 2>&1; then
            echo "=== ato build warnings ==="
            grep -E "^\s*•" ato-build.log || true
            echo ""
          fi

          # Fail on components with no footprint (silently dropped from PCB)
          if grep -qE "No (pickers and no )?footprint for" ato-build.log; then
            echo "::error::Components missing footprints — they will be silently dropped from the PCB:"
            grep -E "No (pickers and no )?footprint for" ato-build.log
            exit 1
          fi

          # Verify PCB exists
          if [ ! -f "$PCB_SRC" ]; then
            echo "::error::ato build did not produce PCB: $PCB_SRC"
            exit 1
          fi
          echo "=== PCB output ==="
          ls -la "$PCB_SRC"

      # --- Stage 2: Generate footprints & faceplate ---
      - name: Generate through-hole footprints
        run: docker run --rm -v "$PWD":/work -w /work "$HW_IMAGE" python3 hardware/scripts/generate_footprints.py

      - name: Generate faceplate PCB
        run: docker run --rm -v "$PWD":/work -w /work "$HW_IMAGE" python3 hardware-faceplate/scripts/generate_faceplate.py

      # --- Stage 3: Place components ---
      - name: Place components
        run: |
          docker run --rm -v "$PWD":/work -w /work "$HW_IMAGE" bash -c "
            set -euo pipefail
            python3 hardware/scripts/place_components.py '$PCB_SRC' '$PCB_PLACED'
            echo '=== Placed PCB ==='
            ls -la '$PCB_PLACED'
          "

      - name: Export layout JSON
        run: |
          docker run --rm -v "$PWD":/work -w /work "$HW_IMAGE" bash -c "
            set -euo pipefail
            python3 hardware/scripts/export_layout.py '$PCB_PLACED' hardware/component-map.json web/src/panel-layout.json
            echo '=== Exported layout ==='
            ls -la web/src/panel-layout.json
          "

      # --- Stage 4: Autoroute ---
      - name: Autoroute
        timeout-minutes: 45
        run: |
          docker run --rm -v "$PWD":/work -w /work "$HW_IMAGE" bash -c "
            set -euo pipefail
            chmod +x hardware/scripts/autoroute.sh
            hardware/scripts/autoroute.sh '$PCB_PLACED' '$PCB_ROUTED'
            echo '=== Routed PCB ==='
            ls -la '$PCB_ROUTED'
          "

      # --- Stage 5: DRC ---
      - name: Run DRC
        run: |
          docker run --rm -v "$PWD":/work -w /work "$HW_IMAGE" bash -c "
            set -euo pipefail
            kicad-cli pcb drc '$PCB_ROUTED' -o drc-report.json --format json --exit-code-violations 2>&1 | tee drc-output.log
            echo ''
            echo '=== DRC report ==='
            cat drc-report.json 2>/dev/null || echo '(no report file)'
          "

      # --- Stage 6: Export manufacturing ---
      - name: Export manufacturing files
        run: |
          docker run --rm -v "$PWD":/work -w /work "$HW_IMAGE" bash -c "
            set -euo pipefail
            python3 hardware/scripts/export_manufacturing.py '$PCB_ROUTED' hardware/build/manufacturing
            echo '=== Manufacturing output ==='
            ls -laR hardware/build/manufacturing/
          "

      # --- Upload reports for debugging ---
      - name: Upload DRC report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: drc-report-${{ github.sha }}
          path: |
            drc-report.json
            drc-output.log
          retention-days: 30
          if-no-files-found: ignore

      # --- Upload artifacts on main ---
      - name: Upload placed PCB
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: placed-pcb-latest
          path: hardware/build/placed.kicad_pcb
          retention-days: 90
          overwrite: true

      - name: Upload KiCad output
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: kicad-output-${{ github.sha }}
          path: hardware/elec/layout/default/
          retention-days: 90

      - name: Upload manufacturing files
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: manufacturing-${{ github.sha }}
          path: |
            hardware/build/manufacturing/
            hardware-faceplate/elec/layout/
          retention-days: 90
