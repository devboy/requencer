name: Atopile Hardware Build

on:
  push:
    paths:
      - 'hardware/**'
  pull_request:
    paths:
      - 'hardware/**'

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/atopile/atopile-kicad:latest

    defaults:
      run:
        working-directory: hardware

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: ato install

      - name: Build schematic
        run: ato build

      - name: Upload KiCad output
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: kicad-output-${{ github.sha }}
          path: hardware/elec/layout/default/
          retention-days: 90
