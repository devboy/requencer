name: Atopile Hardware Build

on:
  push:
    branches: [main]
    paths:
      - 'hardware/boards/**'
      - 'hardware/faceplate/**'
      - '.github/workflows/atopile.yml'
  pull_request:
    paths:
      - 'hardware/boards/**'
      - 'hardware/faceplate/**'
      - '.github/workflows/atopile.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  HW_IMAGE: ghcr.io/devboy/requencer-hw-tools:latest
  CONTROL_PCB_SRC: hardware/boards/elec/layout/control/control.kicad_pcb
  MAIN_PCB_SRC: hardware/boards/elec/layout/main/main.kicad_pcb
  CONTROL_PLACED: hardware/boards/build/control-placed.kicad_pcb
  MAIN_PLACED: hardware/boards/build/main-placed.kicad_pcb
  CONTROL_ROUTED: hardware/boards/build/control-routed.kicad_pcb
  MAIN_ROUTED: hardware/boards/build/main-routed.kicad_pcb

jobs:
  build:
    if: false  # Disabled — using locally generated artifacts for now
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build hardware tools image
        run: |
          docker pull "$HW_IMAGE" 2>/dev/null || true
          docker build --cache-from "$HW_IMAGE" -t "$HW_IMAGE" hardware/docker/

      - name: Print tool versions
        run: |
          docker run --rm "$HW_IMAGE" bash -c '
            echo "=== Tool versions ==="
            ato --version || echo "ato: version flag not supported"
            kicad-cli version || echo "kicad-cli: version flag not supported"
            python3 --version
            echo "=== Installed Python packages ==="
            pip list 2>/dev/null || pip3 list 2>/dev/null || true
          '

      # --- Preflight: fast local validation ---
      - name: Preflight checks
        run: python3 hardware/boards/scripts/preflight_check.py

      # --- Generate validation build ---
      - name: Generate validation build
        run: python3 hardware/boards/scripts/gen_validation.py

      # --- Stage 1: Compile .ato → KiCad ---
      - name: Build hardware
        run: |
          docker run --rm -v "$PWD":/work -w /work "$HW_IMAGE" bash -c '
            set -euo pipefail
            echo "=== ato.yaml ==="
            cat hardware/boards/ato.yaml
            echo ""
            rm -f hardware/boards/elec/layout/control/control.kicad_pcb
            rm -f hardware/boards/elec/layout/main/main.kicad_pcb
            cd hardware/boards
            ato --non-interactive sync
            ato --non-interactive build 2>&1 | tee /work/ato-build.log
            echo ""
            echo "=== Post-build layout dir ==="
            ls -laR elec/layout/ 2>/dev/null || echo "(empty/missing)"
          '

      - name: Check ato build output
        run: |
          # Display all warnings from the build
          if grep -cE "^\s*•" ato-build.log > /dev/null 2>&1; then
            echo "=== ato build warnings ==="
            grep -E "^\s*•" ato-build.log || true
            echo ""
          fi

          # Fail on components with no footprint (silently dropped from PCB)
          if grep -qE "No (pickers and no )?footprint for" ato-build.log; then
            echo "::error::Components missing footprints — they will be silently dropped from the PCB:"
            grep -E "No (pickers and no )?footprint for" ato-build.log
            exit 1
          fi

          # Verify both PCBs exist
          for pcb in "$CONTROL_PCB_SRC" "$MAIN_PCB_SRC"; do
            if [ ! -f "$pcb" ]; then
              echo "::error::ato build did not produce PCB: $pcb"
              exit 1
            fi
            echo "=== PCB output ==="
            ls -la "$pcb"
          done

      # --- Stage 2: Generate footprints & faceplate ---
      - name: Generate through-hole footprints
        run: docker run --rm -v "$PWD":/work -w /work "$HW_IMAGE" python3 hardware/boards/scripts/generate_footprints.py

      - name: Generate faceplate PCB
        run: docker run --rm -v "$PWD":/work -w /work "$HW_IMAGE" python3 hardware/faceplate/scripts/generate_faceplate.py

      # --- Stage 3: Place components (both boards) ---
      - name: Place control board components
        run: |
          docker run --rm -v "$PWD":/work -w /work "$HW_IMAGE" bash -c "
            set -euo pipefail
            python3 hardware/boards/scripts/place_components.py '$CONTROL_PCB_SRC' '$CONTROL_PLACED'
            echo '=== Placed control PCB ==='
            ls -la '$CONTROL_PLACED'
          "

      - name: Place main board components
        run: |
          docker run --rm -v "$PWD":/work -w /work "$HW_IMAGE" bash -c "
            set -euo pipefail
            python3 hardware/boards/scripts/place_components.py --board main '$MAIN_PCB_SRC' '$MAIN_PLACED'
            echo '=== Placed main PCB ==='
            ls -la '$MAIN_PLACED'
          "

      - name: Export layout JSON
        run: |
          docker run --rm -v "$PWD":/work -w /work "$HW_IMAGE" bash -c "
            set -euo pipefail
            python3 hardware/boards/scripts/export_layout.py '$CONTROL_PLACED' hardware/boards/component-map.json web/src/panel-layout.json
            echo '=== Exported layout ==='
            ls -la web/src/panel-layout.json
          "

      # --- Stage 4: Autoroute (both boards) ---
      # Uses FreeRouting v2.0.1 (headless). In this version the optimizer is
      # disabled in CLI mode, so --router.max_passes is the ONLY quality lever.
      # PRs:  fast routability check (4 passes, 10 min timeout, non-blocking)
      # main: production routing  (80 passes, 2 hr timeout, blocking)
      # DSN/SES caching: if the DSN hasn't changed, reuse cached SES.
      - name: Restore route cache
        uses: actions/cache@v4
        with:
          path: hardware/boards/build/route-cache
          key: route-cache-${{ hashFiles('hardware/boards/elec/src/**/*.ato', 'hardware/boards/component-map.json', 'hardware/boards/scripts/place_components.py') }}
          restore-keys: |
            route-cache-

      - name: Autoroute control board
        timeout-minutes: ${{ github.ref == 'refs/heads/main' && 150 || 20 }}
        continue-on-error: ${{ github.ref != 'refs/heads/main' }}
        env:
          FREEROUTING_MP: ${{ github.ref == 'refs/heads/main' && '80' || '4' }}
          FREEROUTING_TIMEOUT: ${{ github.ref == 'refs/heads/main' && '7200' || '600' }}
          # Free GitHub runners: 7 GB RAM, 2 vCPUs. Keep heap conservative.
          FREEROUTING_JAVA_OPTS: ${{ github.ref == 'refs/heads/main' && '-Xmx1g' || '-Xmx512m' }}
        run: |
          docker run --rm -v "$PWD":/work -w /work \
            -e FREEROUTING_MP="$FREEROUTING_MP" \
            -e FREEROUTING_TIMEOUT="$FREEROUTING_TIMEOUT" \
            -e FREEROUTING_JAVA_OPTS="$FREEROUTING_JAVA_OPTS" \
            "$HW_IMAGE" bash -c "
            set -euo pipefail
            chmod +x hardware/boards/scripts/autoroute.sh
            hardware/boards/scripts/autoroute.sh '$CONTROL_PLACED' '$CONTROL_ROUTED'
            echo '=== Routed control PCB ==='
            ls -la '$CONTROL_ROUTED'
          "

      - name: Autoroute main board
        timeout-minutes: ${{ github.ref == 'refs/heads/main' && 150 || 20 }}
        continue-on-error: ${{ github.ref != 'refs/heads/main' }}
        env:
          FREEROUTING_MP: ${{ github.ref == 'refs/heads/main' && '80' || '4' }}
          FREEROUTING_TIMEOUT: ${{ github.ref == 'refs/heads/main' && '7200' || '600' }}
          FREEROUTING_JAVA_OPTS: ${{ github.ref == 'refs/heads/main' && '-Xmx1g' || '-Xmx512m' }}
        run: |
          docker run --rm -v "$PWD":/work -w /work \
            -e FREEROUTING_MP="$FREEROUTING_MP" \
            -e FREEROUTING_TIMEOUT="$FREEROUTING_TIMEOUT" \
            -e FREEROUTING_JAVA_OPTS="$FREEROUTING_JAVA_OPTS" \
            "$HW_IMAGE" bash -c "
            set -euo pipefail
            chmod +x hardware/boards/scripts/autoroute.sh
            hardware/boards/scripts/autoroute.sh '$MAIN_PLACED' '$MAIN_ROUTED'
            echo '=== Routed main PCB ==='
            ls -la '$MAIN_ROUTED'
          "

      # --- Stage 5: DRC (both boards) ---
      - name: Run DRC on control board
        run: |
          docker run --rm -v "$PWD":/work -w /work "$HW_IMAGE" bash -c "
            set -euo pipefail
            kicad-cli pcb drc '$CONTROL_ROUTED' -o drc-control-report.json --format json --exit-code-violations 2>&1 | tee drc-control-output.log
            echo ''
            echo '=== DRC control report ==='
            cat drc-control-report.json 2>/dev/null || echo '(no report file)'
          "

      - name: Run DRC on main board
        run: |
          docker run --rm -v "$PWD":/work -w /work "$HW_IMAGE" bash -c "
            set -euo pipefail
            kicad-cli pcb drc '$MAIN_ROUTED' -o drc-main-report.json --format json --exit-code-violations 2>&1 | tee drc-main-output.log
            echo ''
            echo '=== DRC main report ==='
            cat drc-main-report.json 2>/dev/null || echo '(no report file)'
          "

      # --- Stage 6: Export manufacturing ---
      - name: Export manufacturing files
        run: |
          docker run --rm -v "$PWD":/work -w /work "$HW_IMAGE" bash -c "
            set -euo pipefail
            python3 hardware/boards/scripts/export_manufacturing.py '$CONTROL_ROUTED' hardware/boards/build/manufacturing/control
            python3 hardware/boards/scripts/export_manufacturing.py '$MAIN_ROUTED' hardware/boards/build/manufacturing/main
            echo '=== Manufacturing output ==='
            ls -laR hardware/boards/build/manufacturing/
          "

      # --- Upload reports for debugging ---
      - name: Upload DRC reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: drc-reports-${{ github.sha }}
          path: |
            drc-control-report.json
            drc-control-output.log
            drc-main-report.json
            drc-main-output.log
          retention-days: 30
          if-no-files-found: ignore

      # --- Upload artifacts on main ---
      - name: Upload placed PCBs
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: placed-pcbs-latest
          path: |
            hardware/boards/build/control-placed.kicad_pcb
            hardware/boards/build/main-placed.kicad_pcb
          retention-days: 90
          overwrite: true

      - name: Upload KiCad output
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: kicad-output-${{ github.sha }}
          path: |
            hardware/boards/elec/layout/control/
            hardware/boards/elec/layout/main/
          retention-days: 90

      - name: Upload manufacturing files
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: manufacturing-${{ github.sha }}
          path: |
            hardware/boards/build/manufacturing/
            hardware/faceplate/elec/layout/
          retention-days: 90
