name: Atopile Hardware Build

on:
  push:
    branches: [main]
    paths:
      - 'hardware/**'
      - '!hardware/docker/**'
      - 'hardware-faceplate/**'
  pull_request:
    paths:
      - 'hardware/**'
      - '!hardware/docker/**'
      - 'hardware-faceplate/**'

env:
  HW_IMAGE: ghcr.io/devboy/requencer-hw-tools:latest

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Pull or build hardware tools image
        run: |
          docker pull "$HW_IMAGE" 2>/dev/null || \
          docker build -t "$HW_IMAGE" hardware/docker/

      - name: Build schematic
        run: |
          docker run --rm -v "$PWD":/work -w /work "$HW_IMAGE" bash -c '
            rm -f hardware/elec/layout/default/default.kicad_pcb
            cd hardware && ato --non-interactive build
          '

      - name: Generate through-hole footprints
        run: docker run --rm -v "$PWD":/work -w /work "$HW_IMAGE" python3 hardware/scripts/generate_footprints.py

      - name: Generate faceplate PCB
        run: docker run --rm -v "$PWD":/work -w /work "$HW_IMAGE" python3 hardware-faceplate/scripts/generate_faceplate.py

      - name: Place components
        run: |
          docker run --rm -v "$PWD":/work -w /work "$HW_IMAGE" bash -c '
            PCB="hardware/elec/layout/default/default.kicad_pcb"
            if [ -f "$PCB" ]; then
              python3 hardware/scripts/place_components.py "$PCB" hardware/build/placed.kicad_pcb
            fi
          '

      - name: Export layout JSON
        run: |
          docker run --rm -v "$PWD":/work -w /work "$HW_IMAGE" bash -c '
            PCB="hardware/build/placed.kicad_pcb"
            if [ -f "$PCB" ]; then
              python3 hardware/scripts/export_layout.py "$PCB" hardware/component-map.json web/src/panel-layout.json
            fi
          '

      - name: Autoroute
        timeout-minutes: 45
        run: |
          docker run --rm -v "$PWD":/work -w /work "$HW_IMAGE" bash -c '
            PCB="hardware/build/placed.kicad_pcb"
            if [ -f "$PCB" ]; then
              chmod +x hardware/scripts/autoroute.sh
              hardware/scripts/autoroute.sh "$PCB" hardware/build/routed.kicad_pcb
            fi
          '

      - name: Run DRC
        run: |
          docker run --rm -v "$PWD":/work -w /work "$HW_IMAGE" bash -c '
            PCB="hardware/build/routed.kicad_pcb"
            if [ -f "$PCB" ]; then
              kicad-cli pcb drc "$PCB" -o drc-report.json --format json 2>&1 || true
              echo "DRC complete (see report for details)"
            else
              echo "Routed PCB not found, skipping DRC"
            fi
          '

      - name: Export manufacturing files
        run: |
          docker run --rm -v "$PWD":/work -w /work "$HW_IMAGE" bash -c '
            PCB="hardware/build/routed.kicad_pcb"
            if [ -f "$PCB" ]; then
              python3 hardware/scripts/export_manufacturing.py "$PCB" hardware/build/manufacturing
            fi
          '

      - name: Upload placed PCB
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: placed-pcb-latest
          path: hardware/build/placed.kicad_pcb
          retention-days: 90
          overwrite: true

      - name: Upload KiCad output
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: kicad-output-${{ github.sha }}
          path: hardware/elec/layout/default/
          retention-days: 90

      - name: Upload manufacturing files
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: manufacturing-${{ github.sha }}
          path: |
            hardware/build/manufacturing/
            hardware-faceplate/elec/layout/
          retention-days: 90
