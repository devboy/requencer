name: Atopile Hardware Build

on:
  push:
    branches: [main]
    paths:
      - 'hardware/**'
      - '!hardware/docker/**'
      - 'hardware-faceplate/**'
  pull_request:
    paths:
      - 'hardware/**'
      - '!hardware/docker/**'
      - 'hardware-faceplate/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  HW_IMAGE: ghcr.io/devboy/requencer-hw-tools:latest
  PCB_SRC: hardware/elec/layout/default/default.kicad_pcb
  SCH_SRC: hardware/elec/layout/default/default.kicad_sch
  PCB_PLACED: hardware/build/placed.kicad_pcb
  PCB_ROUTED: hardware/build/routed.kicad_pcb

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Pull or build hardware tools image
        run: |
          docker pull "$HW_IMAGE" 2>/dev/null || \
          docker build -t "$HW_IMAGE" hardware/docker/

      - name: Print tool versions
        run: |
          docker run --rm "$HW_IMAGE" bash -c '
            echo "=== Tool versions ==="
            ato --version || echo "ato: version flag not supported"
            kicad-cli version || echo "kicad-cli: version flag not supported"
            python3 --version
            echo "=== Installed Python packages ==="
            pip list 2>/dev/null || pip3 list 2>/dev/null || true
          '

      # --- Stage 1: Compile .ato → KiCad ---
      - name: Build schematic
        run: |
          docker run --rm -v "$PWD":/work -w /work "$HW_IMAGE" bash -c '
            set -euo pipefail
            echo "=== ato.yaml ==="
            cat hardware/ato.yaml
            echo ""
            echo "=== Pre-build layout dir ==="
            ls -laR hardware/elec/layout/ 2>/dev/null || echo "(empty/missing)"
            echo ""
            rm -f hardware/elec/layout/default/default.kicad_pcb
            cd hardware && ato --non-interactive build 2>&1 | tee /work/ato-build.log
            echo ""
            echo "=== Post-build layout dir ==="
            ls -laR elec/layout/ 2>/dev/null || echo "(empty/missing)"
            echo ""
            echo "=== All .kicad_* files in hardware/ ==="
            find /work/hardware -name "*.kicad_*" -type f 2>/dev/null || echo "(none found)"
          '

      - name: Check ato build output
        run: |
          # Fail on missing components (silently dropped from PCB)
          if grep -q "No pickers and no footprint" ato-build.log; then
            echo "::error::Components missing pickers/footprints — they will be silently dropped from the PCB:"
            grep "No pickers and no footprint" ato-build.log
            exit 1
          fi
          # Show what ato actually produced
          echo "=== ato build output files ==="
          ls -laR hardware/elec/layout/default/
          # Verify expected outputs exist
          if [ ! -f "$PCB_SRC" ]; then
            echo "::error::ato build did not produce PCB: $PCB_SRC"
            exit 1
          fi
          if [ ! -f "$SCH_SRC" ]; then
            echo "::error::ato build did not produce schematic: $SCH_SRC"
            exit 1
          fi

      # --- Stage 2: ERC ---
      - name: Run ERC
        run: |
          docker run --rm -v "$PWD":/work -w /work "$HW_IMAGE" bash -c "
            set -euo pipefail
            echo '=== Running ERC on $SCH_SRC ==='
            kicad-cli sch erc '$SCH_SRC' -o erc-report.json --format json --exit-code-violations 2>&1 | tee erc-output.log
            echo ''
            echo '=== ERC report ==='
            cat erc-report.json 2>/dev/null || echo '(no report file)'
          "

      # --- Stage 3: Generate footprints & faceplate ---
      - name: Generate through-hole footprints
        run: docker run --rm -v "$PWD":/work -w /work "$HW_IMAGE" python3 hardware/scripts/generate_footprints.py

      - name: Generate faceplate PCB
        run: docker run --rm -v "$PWD":/work -w /work "$HW_IMAGE" python3 hardware-faceplate/scripts/generate_faceplate.py

      # --- Stage 4: Place components ---
      - name: Place components
        run: |
          docker run --rm -v "$PWD":/work -w /work "$HW_IMAGE" bash -c "
            set -euo pipefail
            python3 hardware/scripts/place_components.py '$PCB_SRC' '$PCB_PLACED'
            echo '=== Placed PCB ==='
            ls -la '$PCB_PLACED'
          "

      - name: Export layout JSON
        run: |
          docker run --rm -v "$PWD":/work -w /work "$HW_IMAGE" bash -c "
            set -euo pipefail
            python3 hardware/scripts/export_layout.py '$PCB_PLACED' hardware/component-map.json web/src/panel-layout.json
            echo '=== Exported layout ==='
            ls -la web/src/panel-layout.json
          "

      # --- Stage 5: Autoroute ---
      - name: Autoroute
        timeout-minutes: 45
        run: |
          docker run --rm -v "$PWD":/work -w /work "$HW_IMAGE" bash -c "
            set -euo pipefail
            chmod +x hardware/scripts/autoroute.sh
            hardware/scripts/autoroute.sh '$PCB_PLACED' '$PCB_ROUTED'
            echo '=== Routed PCB ==='
            ls -la '$PCB_ROUTED'
          "

      # --- Stage 6: DRC ---
      - name: Run DRC
        run: |
          docker run --rm -v "$PWD":/work -w /work "$HW_IMAGE" bash -c "
            set -euo pipefail
            kicad-cli pcb drc '$PCB_ROUTED' -o drc-report.json --format json --exit-code-violations 2>&1 | tee drc-output.log
            echo ''
            echo '=== DRC report ==='
            cat drc-report.json 2>/dev/null || echo '(no report file)'
          "

      # --- Stage 7: Export manufacturing ---
      - name: Export manufacturing files
        run: |
          docker run --rm -v "$PWD":/work -w /work "$HW_IMAGE" bash -c "
            set -euo pipefail
            python3 hardware/scripts/export_manufacturing.py '$PCB_ROUTED' hardware/build/manufacturing
            echo '=== Manufacturing output ==='
            ls -laR hardware/build/manufacturing/
          "

      # --- Always upload logs/reports for debugging ---
      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ato-build-log
          path: ato-build.log
          retention-days: 30

      - name: Upload ERC/DRC reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: check-reports-${{ github.sha }}
          path: |
            erc-report.json
            erc-output.log
            drc-report.json
            drc-output.log
          retention-days: 30
          if-no-files-found: ignore

      # --- Upload artifacts on main ---
      - name: Upload placed PCB
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: placed-pcb-latest
          path: hardware/build/placed.kicad_pcb
          retention-days: 90
          overwrite: true

      - name: Upload KiCad output
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: kicad-output-${{ github.sha }}
          path: hardware/elec/layout/default/
          retention-days: 90

      - name: Upload manufacturing files
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: manufacturing-${{ github.sha }}
          path: |
            hardware/build/manufacturing/
            hardware-faceplate/elec/layout/
          retention-days: 90
