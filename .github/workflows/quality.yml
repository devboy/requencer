name: Quality

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Check
        run: cargo check -p requencer-engine -p requencer-renderer -p requencer-web

      - name: Clippy
        run: cargo clippy -p requencer-engine -p requencer-renderer -p requencer-web -- -D warnings

      - name: Tests
        run: cargo test --workspace

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - run: cd web && npm ci

      - name: Type check
        run: cd web && npx tsc --noEmit

      - name: Lint & format
        run: cd web && npm run check

      - name: Tests with coverage
        run: cd web && npm run test:coverage

      - name: Dead code check
        run: cd web && npm run dead-code

      - name: Engine purity check
        run: |
          if grep -rE "from ['\"]tone['\"]|from ['\"]tone/|require\(['\"]tone|window\.|document\.|navigator\." web/src/engine/ --include="*.ts" | grep -v "__tests__" | grep -v ".bench.ts"; then
            echo "::error::Engine layer contains forbidden imports (DOM/audio/Tone.js)"
            exit 1
          fi
          echo "Engine purity check passed"

      - name: Coverage summary
        if: always()
        run: |
          if [ -f web/coverage/coverage-summary.json ]; then
            echo "## Coverage Summary" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            node -e "
              const c = require('./web/coverage/coverage-summary.json').total;
              const fmt = (m) => m.pct + '%';
              console.log('| Metric | Coverage |');
              console.log('|--------|----------|');
              console.log('| Statements | ' + fmt(c.statements) + ' |');
              console.log('| Branches | ' + fmt(c.branches) + ' |');
              console.log('| Functions | ' + fmt(c.functions) + ' |');
              console.log('| Lines | ' + fmt(c.lines) + ' |');
            " >> "$GITHUB_STEP_SUMMARY"
          fi
